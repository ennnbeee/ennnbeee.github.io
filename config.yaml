baseURL: 'http://memv.ennbee.uk'
languageCode: en-gb
title: MEMvENNBEE
theme: PaperMod
paginate: 5
publishDir: docs
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true
minify:
  disableXML: true
  minifyOutput: true
params:
  env: production
  #title: MEM v NB
  #description: Battles with Endpoint Manager
  keywords:
    - Blog
    - Technology
    - Endpoint Manager
    - PaperMod
  author: Me
  images:
    - '<link or path of image for opengraph, twitter-cards>'
  DateFormat: 'January 2, 2006'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  assets: {}
  label:
    text: MEMvENNBEE
    iconHeight: 35
  profileMode:
    enabled: false
    title: ExampleSite
    subtitle: This is subtitle
    #imageUrl: <img location>
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags
  homeInfoParams:
    Title: Battles with Endpoint Manager
    Content: >-
      For those who like me, face the endless fight for, with and against Microsoft Endpoint Manager.

      
  socialIcons:
    - name: linkedin
      url: 'https://www.linkedin.com/in/njbenton/'
    - name: github
      url: 'https://github.com/ennnbeee/mem-scripts/'
  analytics:
    google: {}
    bing: {}
    yandex: {}
  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: true
  editPost:
    URL: 'https://github.com/ennnbeee/ennnbeee.github.io/tree/main/content/posts'
    Text: Suggest Changes
    appendFilePath: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: categories
      name: categories
      url: /categories/
      weight: 20
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20
    - identifier: search
      name: search
      url: /search/
      weight: 20
outputs:
    home:
        - HTML
        - RSS
        - JSON
