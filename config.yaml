baseURL: 'https://memv.ennbee.uk'
languageCode: en-gb
title: MEM v ENNBEE - Battles with Endpoint Manager
theme: PaperMod
paginate: 5
publishDir: docs
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
#pygmentsUseClasses: true
minify:
  disableXML: true
  minifyOutput: true
params:
  env: production
  #title: MEM v NB
  #description: Battles with Endpoint Manager
  keywords:
    - Blog
    - Technology
    - Endpoint Manager
    - PaperMod
    - Microsoft
    - Intune
  author: Nick Benton
  images:
    - '<link or path of image for opengraph, twitter-cards>'
  DateFormat: 'January 2, 2006'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  assets:
    disableHLJS: true
  label:
    text: MEM v ENNBEE
    icon: https://memv.ennbee.uk/fight.png
    iconHeight: 35
  profileMode:
    enabled: false
    title: ExampleSite
    subtitle: This is subtitle
    #imageUrl: <img location>
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags
  homeInfoParams:
    Title: Battles with Endpoint Manager
    Content: >
            For those, who like me, face the endless daily fight for, with, and against Microsoft Endpoint Manager. 

            - Hopefully this blog gives you some assistance with your own battle managing end-user devices.

            -

            - **Disclaimer:** The views expressed anywhere on this site are strictly mine and not the opinions and views of my employer or any vendor mentioned. All items provided should be tested prior to implementation and I hold no liability for the outcome of the recommendations provided.

  socialIcons:
    - name: linkedin
      url: 'https://www.linkedin.com/in/njbenton/'
    - name: github
      url: 'https://github.com/ennnbeee/mem-scripts/'
  analytics:
    google: {}
    bing: {}
    yandex: {}
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
  editPost:
    URL: 'https://github.com/ennnbeee/ennnbeee.github.io/tree/main/content/'
    Text: Suggest Changes
    appendFilePath: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    #- identifier: categories
    #  name: categories
    #  url: /categories/
    #  weight: 20
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20
    - identifier: search
      name: search
      url: /search/
      weight: 20
outputs:
    home:
        - HTML
        - RSS
        - JSON
markup:
    highlight:
        # anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        # noClasses: false
        style: monokai
